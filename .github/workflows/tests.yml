name: Tests

on: workflow_call

permissions: {}

jobs:
  node-test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npm test

  playwright:
    name: Playwright
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - name: Start playwright
        run: |
          npm run start-playwright-image > playwright-server.log 2>&1 &
          echo "Waiting for Playwright server to be ready..."
          timeout=60
          counter=0
          until grep -q "Listening on ws://0.0.0.0:5001/" playwright-server.log || [ $counter -ge $timeout ]; do
            sleep 1
            counter=$((counter+1))
            if [ $counter -eq $timeout ]; then
              echo "Timed out waiting for Playwright server to start"
              cat playwright-server.log
              exit 1
            fi
          done
          echo "Playwright server is ready!"
      - run: npm run playwright
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
