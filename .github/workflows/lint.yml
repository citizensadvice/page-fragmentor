name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - v2.*

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      - name: Install dependencies
        run: npm ci
      - name: Run linting
        run: npm run lint
